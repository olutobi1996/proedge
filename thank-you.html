<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | ProEdge Coaching</title>
  <link rel="stylesheet" href="/css/style.css">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: #000;
    }

    .success-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url(/images/proedgelogo.jpg) no-repeat center center / cover;
      position: relative;
    }

    .success-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
    }

    /* 🔴 MAIN BOX */
    .success-box {
      background: #000;
      border: 2px solid #ee1e46;
      color: #fff;
      border-radius: 16px;
      padding: 3rem 4rem;
      max-width: 600px;
      text-align: center;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 20px rgba(238, 30, 70, 0.4);
    }

    .success-box h1 {
      font-size: 2.5rem;
      color: #fff;
      margin-bottom: 10px;
    }

    /* 🔴 underline */
    .success-box h1::after {
      content: "";
      display: block;
      width: 80px;
      height: 3px;
      background: #ee1e46;
      margin: 0.8rem auto 0;
      border-radius: 2px;
    }

    .success-box p {
      color: #ccc;
      line-height: 1.6;
    }

    /* 🔴 BUTTON */
    .cta-button {
      display: inline-block;
      margin-top: 20px;
      background: #ee1e46;
      color: #fff;
      padding: 0.8rem 1.6rem;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    .cta-button:hover {
      background: #b3122f;
      color: #fff;
    }

    @media(max-width: 768px){
      .success-box {
        padding: 2rem;
        margin: 1rem;
      }
    }
  </style>

  <script>
    setTimeout(() => {
      window.location.href = "/";
    }, 5000);
  </script>
</head>

<body>
  <div class="success-wrapper">
    <div class="success-overlay"></div>

    <div class="success-box">
      <h1>Thank You!</h1>

      <p>Your message has been successfully sent to <strong>ProEdge Coaching</strong>.</p>

      <p>We’ll get back to you shortly to discuss your session or answer any questions.</p>

      <p>We look forward to helping you improve your game ⚽</p>

      <a href="/index.html" class="cta-button">Back to Home</a>
    </div>
  </div>
</body>
</html>
